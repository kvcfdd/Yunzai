# AIGC 开关
enable: false

# AIGC Provider: openai | gemini
provider: openai

# OpenAI 兼容接口
openai:
  endpoint: https://api.openai.com # 可替换为兼容 OpenAI API 的其他服务地址
  api_key: "" # 多 Key 用英文逗号分隔，如 "sk-xxx,sk-yyy"
  model: gpt-4o-mini # 模型

# Google Gemini
gemini:
  endpoint: https://generativelanguage.googleapis.com # 可替换为兼容 Google Gemini API 的反代地址
  api_key: "" # 多 Key 用英文逗号分隔，如 "xxx,yyy"
  model: gemini-3.5-flash # 模型

# 输出最大长度
max_tokens: 2048
# 输出随机程度 (0-1，值越大输出越随机)
temperature: 0.9
# 机器人名称(会拼接至提示词开头和日志中)
bot_name: AIGC Bot
# 系统提示词 (你的名字叫 bot_name，system_prompt)
system_prompt: You are an intelligent chatbot assistant.

# MCP 工具服务器 (支持 Streamable HTTP 和 stdio)
mcp:
  servers: []
  # Streamable HTTP 传输:
  #   - name: my-http-tools
  #     transport: http
  #     url: http://localhost:3000/mcp
  #     api_key: ""
  #     timeout_ms: 30000
  # stdio 传输:
  #   - name: my-local-tools
  #     transport: stdio
  #     command: npx
  #     args: ["-y", "@anthropic/mcp-server-filesystem", "/allowed/dir"]
  #     env: {}
  #     timeout_ms: 30000

# 本地代理
proxy:
  address: "" # 代理地址，如 http://127.0.0.1:7890，为空则不启用
  enable: true # LLM 请求是否走代理

# 私聊开关
private_enable: true
# 群白名单
group_whitelist:
#  - 123456789

# QQ 黑名单
qq_blacklist:
#  - 987654321

# 前缀过滤
prefix_filter:
  - "[自动回复]"

# 群聊记录携带条数，0 则不携带
group_history_count: 30
# 是否将思维链以合并转发方式单独发送
show_thinking: false
# 思考模式：启用后模型会在回复前进行内部推理（只控制OpenAI兼容模式且需模型支持）
thinking: false
# 是否允许分句回复
split_reply: false
# B站 Cookie（用于视频搜索和下载，不填则使用匿名会话）
bilibili_cookie: ""
# 对话历史长度，单位为消息轮数
max_history: 30
